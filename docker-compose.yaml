services:

  postgres:
    image: postgres:18-alpine
    container_name: wishlist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wishlist}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-4221}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wishlist}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: wishlist-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-4221}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-4221}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: wishlist-s3
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/ready" ] # Tested, `curl` is present in image
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:latest
    container_name: wishlist-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: 1
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: wishlist-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAIN_PATH: ./cmd/api
        BIN_NAME: wishlist
    image: wishlist-api:latest
    container_name: wishlist-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - "${CONFIG_PATH:-./config.yaml}:/app/config.yaml:ro"
    environment:
      APP_LOG_LOG2FILE: "false"
      APP_API_HOST: "0.0.0.0"
      APP_API_PORT: "8080"
      APP_API_AUTH_JWT_ISSUER: ${APP_API_AUTH_JWT_ISSUER:-wishlist}
      APP_API_AUTH_JWT_AUDIENCE: ${APP_API_AUTH_JWT_AUDIENCE:-wishlist-app}
      APP_API_AUTH_ACCESS_TOKEN_SECRET: ${APP_API_AUTH_ACCESS_TOKEN_SECRET:-dev-access-secret-change-me}
      APP_API_AUTH_REFRESH_TOKEN_SECRET: ${APP_API_AUTH_REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-me}
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_USER: ${POSTGRES_USER:-postgres}
      APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-4221}
      APP_DATABASE_DATABASE_NAME: ${POSTGRES_DB:-wishlist}
      APP_DATABASE_SSL_MODE: disable
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: "6379"
      APP_REDIS_PASSWORD: ${REDIS_PASSWORD:-4221}
      APP_REDIS_DATABASE: ${REDIS_DB:-0}
      APP_MINIO_ENDPOINT: minio:9000
      APP_MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      APP_MINIO_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_MINIO_USE_SSL: "false"
      APP_MINIO_BUCKET_NAME: ${MINIO_BUCKET:-wishlist}
      APP_BROKER_TYPE: ${APP_BROKER_TYPE:-none}
      APP_BROKER_KAFKA_BROKERS: ${APP_BROKER_KAFKA_BROKERS:-kafka:9092}
      APP_BROKER_KAFKA_GROUP_ID: ${APP_BROKER_KAFKA_GROUP_ID:-wishlist-email-sender}
      APP_BROKER_KAFKA_TOPIC_PREFIX: ${APP_BROKER_KAFKA_TOPIC_PREFIX:-wishlist}
      APP_BROKER_KAFKA_AUTH_ENABLED: ${APP_BROKER_KAFKA_AUTH_ENABLED:-false}
      APP_BROKER_KAFKA_AUTH_MECHANISM: ${APP_BROKER_KAFKA_AUTH_MECHANISM:-plain}
      APP_BROKER_KAFKA_AUTH_USERNAME: ${APP_BROKER_KAFKA_AUTH_USERNAME:-wishlist}
      APP_BROKER_KAFKA_AUTH_PASSWORD: ${APP_BROKER_KAFKA_AUTH_PASSWORD:-password}
      APP_BROKER_KAFKA_AUTH_TLS: ${APP_BROKER_KAFKA_AUTH_TLS:-false}
      APP_BROKER_RABBITMQ_URL: ${APP_BROKER_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}

  email-sender:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MAIN_PATH: ./cmd/email-sender
        BIN_NAME: wishlist
    image: wishlist-email-sender:latest
    container_name: wishlist-email-sender
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      kafka:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - "${CONFIG_PATH:-./config.yaml}:/app/config.yaml:ro"
    environment:
      APP_LOG_LOG2FILE: "false"
      APP_API_HOST: "0.0.0.0"
      APP_API_PORT: "8080"
      APP_API_AUTH_JWT_ISSUER: ${APP_API_AUTH_JWT_ISSUER:-wishlist}
      APP_API_AUTH_JWT_AUDIENCE: ${APP_API_AUTH_JWT_AUDIENCE:-wishlist-app}
      APP_API_AUTH_ACCESS_TOKEN_SECRET: ${APP_API_AUTH_ACCESS_TOKEN_SECRET:-dev-access-secret-change-me}
      APP_API_AUTH_REFRESH_TOKEN_SECRET: ${APP_API_AUTH_REFRESH_TOKEN_SECRET:-dev-refresh-secret-change-me}
      APP_DATABASE_HOST: postgres
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_USER: ${POSTGRES_USER:-postgres}
      APP_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-4221}
      APP_DATABASE_DATABASE_NAME: ${POSTGRES_DB:-wishlist}
      APP_DATABASE_SSL_MODE: disable
      APP_REDIS_HOST: redis
      APP_REDIS_PORT: "6379"
      APP_REDIS_PASSWORD: ${REDIS_PASSWORD:-4221}
      APP_REDIS_DATABASE: ${REDIS_DB:-0}
      APP_MINIO_ENDPOINT: minio:9000
      APP_MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      APP_MINIO_ACCESS_KEY_SECRET: ${MINIO_ROOT_PASSWORD:-minioadmin}
      APP_MINIO_USE_SSL: "false"
      APP_MINIO_BUCKET_NAME: ${MINIO_BUCKET:-wishlist}
      APP_WEBAPP_DOMAIN: ${APP_WEBAPP_DOMAIN:-http://localhost:8080}
      APP_EMAIL_HOST: ${APP_EMAIL_HOST:-smtp.gmail.com}
      APP_EMAIL_PORT: ${APP_EMAIL_PORT:-587}
      APP_EMAIL_USER: ${APP_EMAIL_USER:-your@gmail.com}
      APP_EMAIL_PASSWORD: ${APP_EMAIL_PASSWORD:-change-me}
      APP_EMAIL_FROM: ${APP_EMAIL_FROM:-Wishlist <your@gmail.com>}
      APP_BROKER_TYPE: ${APP_BROKER_TYPE:-none}
      APP_BROKER_KAFKA_BROKERS: ${APP_BROKER_KAFKA_BROKERS:-kafka:9092}
      APP_BROKER_KAFKA_GROUP_ID: ${APP_BROKER_KAFKA_GROUP_ID:-wishlist-email-sender}
      APP_BROKER_KAFKA_TOPIC_PREFIX: ${APP_BROKER_KAFKA_TOPIC_PREFIX:-wishlist}
      APP_BROKER_KAFKA_AUTH_ENABLED: ${APP_BROKER_KAFKA_AUTH_ENABLED:-false}
      APP_BROKER_KAFKA_AUTH_MECHANISM: ${APP_BROKER_KAFKA_AUTH_MECHANISM:-plain}
      APP_BROKER_KAFKA_AUTH_USERNAME: ${APP_BROKER_KAFKA_AUTH_USERNAME:-wishlist}
      APP_BROKER_KAFKA_AUTH_PASSWORD: ${APP_BROKER_KAFKA_AUTH_PASSWORD:-password}
      APP_BROKER_KAFKA_AUTH_TLS: ${APP_BROKER_KAFKA_AUTH_TLS:-false}
      APP_BROKER_RABBITMQ_URL: ${APP_BROKER_RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  rabbitmq_data:
